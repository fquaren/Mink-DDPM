# --- I/O AND PATHS (OCTOPUS CLUSTER) ---
RAW_OPERA_DATA_DIR: "/home/fquareng/work/data/extremes/OPERA/raw/OPERA"
METADATA_DIR: "/home/fquareng/work/data/extremes/OPERA"
PREPROCESSED_DATA_DIR: "/home/fquareng/work/data/extremes/OPERA/patches/precip"
DEM_DATA_DIR: "/home/fquareng/work/data/extremes/OPERA/patches/dem"
DEM_STATS: "/home/fquareng/work/data/extremes/OPERA/patches/dem/dem_stats.json"
STATIC_DEM_PATH: "/home/fquareng/work/data/extremes/OPERA/europe_dem_laea.tif"

TRAIN_METADATA_FILE: "/home/fquareng/work/data/extremes/OPERA/train_patches_metadata.txt"
VAL_METADATA_FILE: "/home/fquareng/work/data/extremes/OPERA/val_patches_metadata.txt"
TEST_METADATA_FILE: "/home/fquareng/work/data/extremes/OPERA/test_patches_metadata.txt"

# --- PHYSICAL PREPROCESSING ---
WORKER_CHUNK_SIZE: 250 
PRECIP_VAR_NAME: "TOT_PREC"
PATCH_SIZE: 128
DOWNSCALING_FACTOR: 12.5  # ERA5-like to OPERA km-scale (25km / 2km)
PIXEL_SIZE_KM: 2.0
DRIZZLE_THRESHOLD: 0.1
DECLUTTER_THRESHOLD: 150.0
# PERSISTENCE_THRESHOLD: 1.0  # TDA topological noise floor 
SPLIT_RATIOS:
  train: 0.8
  validation: 0.1
  test: 0.1

# --- DDPM TRAINING & HARDWARE ---
EXPERIMENT_NAME: "DDPM_SR_Minkowski"
DEVICE: "cuda"
NUM_WORKERS: 4
MAX_WORKERS: 4
BATCH_SIZE: 128
NUM_EPOCHS: 25
PATIENCE: 5
LEARNING_RATE: 1.0e-5
WEIGHT_DECAY: 1.0e-5

# Dataset Balancing
WET_DRY_RATIO: 1.0  # 1.0 = 1:1 ratio. Ensures the DDPM learns convective structures.

# --- 4. TOPOLOGICAL TARGETS & EMULATOR ---
# Climatological probability quantiles for Minkowski targets
# QUANTILE_LEVELS: [0.01, 0.05, 0.1, 0.25, 0.5, 0.75, 0.9, 0.95, 0.99]
QUANTILE_LEVELS: [0.01, 0.05, 0.1 , 0.15, 0.2 , 0.25, 0.3 , 0.35, 0.4 , 0.45, 0.5 ,
       0.55, 0.6 , 0.65, 0.7 , 0.75, 0.8 , 0.85, 0.9 , 0.95, 0.99]

# Path to the frozen emulator predicting the topological targets
EMULATOR_CHECKPOINT_PATH: "/home/fquareng/work/ch2/ci26_revision_runs/GammaEmulator_Constrained_SingleRun_2026-04-02_10-39-14/best_model_checkpoint.pth"
#"/home/fquareng/work/ch2/final_experiment_runs/GammaEmulator_v6_Constrained_T1_2026-03-13_08-22-37/best_model_checkpoint.pth" 
#"/home/fquareng/work/final_experiment_runs/GammaEmulator_v6_Constrained_SingleRun_2026-01-23_14-44-58/best_model_checkpoint.pth"

# Required for load_emulator() instantiation
ARCHITECTURE: "Constrained"  # 'Baseline', 'Lipschitz', 'Constrained'

# --- MINKOWSKI CURRICULUM (EXPERIMENT TOGGLES) ---

# Set by arguments, default to 0.0 for ablation
MINKOWSKI_TARGET_WEIGHT: 0.0

# The Curriculum (Ramps up the weight over N epochs after physical convergence)
MINKOWSKI_WARMUP_EPOCHS: 5

# The Time Gate (Do not compute Minkowski loss if diffusion timestep t >= threshold)
MINKOWSKI_T_THRESHOLD: 250

# The Trust Gate (Exponential decay based on emulator confidence). 
# Run `calibrate_tau_log_space()` to find the exact aggressive/stable value.
TRUST_TAU: 0.005725
